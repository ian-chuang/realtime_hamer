[build-system]
requires = ["uv_build>=0.9.5"]
build-backend = "uv_build"

[project]
name = "realtime-hamer"
version = "0.1.0"
description = "Realtime HaMeR hand reconstruction (RTMPose + TensorRT + PyTorch3D)"
readme = "README.md"
requires-python = ">=3.11,<3.12"
dependencies = [
    # Core ML stack (CUDA 12.8 / RTX 5090)
    "torch==2.9.0",
    "torchvision==0.24.1",
    # torch-tensorrt 2.9 needs TensorRT 10 Python bindings (tensorrt-cu13).
    # Do not also pin tensorrt-cu12/11.x — those override the API it needs.
    # System TensorRT 11 (trtexec) can still be used separately for ONNX engines.
    "torch-tensorrt==2.9.0",
    "tensorrt==10.13.3.9.post1",
    "tensorrt-cu13==10.13.3.9.post1",
    # Hand detection (RTMPose via onnxruntime-gpu).
    # Pin to CUDA-12 builds; 1.23+ on PyPI targets CUDA 13.
    "onnxruntime-gpu==1.22.0",
    "rtmlib>=0.0.15",
    # HaMeR inference deps (from geopavlakos/hamer, minus detectron2/mmcv)
    "einops>=0.8.0",
    "numpy>=1.26.0",
    "opencv-python>=4.8.0",
    "pytorch-lightning>=2.0.0",
    "scikit-image>=0.22.0",
    "smplx==0.1.28",
    "timm>=0.9.0",
    "yacs>=0.1.8",
    "omegaconf>=2.3.0",
    # Rendering
    "pytorch3d==0.7.9+pt2.9.0cu128",
    "trimesh>=4.0.0",
    "pyrender>=0.1.45",
    "chumpy",
]

[tool.uv]
override-dependencies = [
    "torch==2.9.0", # for rtx 5090
    "torchvision==0.24.1", # for rtx 5090
]

[[tool.uv.index]]
name = "torch-packages-builder"
url = "https://miropsota.github.io/torch_packages_builder"
explicit = true

[tool.uv.sources]
pytorch3d = { index = "torch-packages-builder" }
chumpy = { git = "https://github.com/mattloper/chumpy" }
